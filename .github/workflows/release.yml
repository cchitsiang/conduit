name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.5.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: true

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Update version in Cargo.toml
        run: |
          sed -i '' "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" src-tauri/Cargo.toml

      - name: Update version in package.json
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version

      - name: Update version in tauri.conf.json
        run: |
          sed -i '' "s/\"version\": \".*\"/\"version\": \"${{ inputs.version }}\"/" src-tauri/tauri.conf.json

      - name: Build signed Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Generate latest.json updater manifest
        run: |
          SIG=$(cat src-tauri/target/release/bundle/macos/conduit.app.tar.gz.sig)
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > src-tauri/target/release/bundle/macos/latest.json << EOFJ
          {
            "version": "v${{ inputs.version }}",
            "notes": "See release notes on GitHub",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/cchitsiang/conduit/releases/download/v${{ inputs.version }}/conduit.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${SIG}",
                "url": "https://github.com/cchitsiang/conduit/releases/download/v${{ inputs.version }}/conduit.app.tar.gz"
              }
            }
          }
          EOFJ

      - name: List build artifacts
        run: |
          ls -lh src-tauri/target/release/bundle/macos/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Conduit v${{ inputs.version }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/macos/conduit.app.tar.gz
            src-tauri/target/release/bundle/macos/conduit.app.tar.gz.sig
            src-tauri/target/release/bundle/macos/latest.json
            src-tauri/target/release/bundle/dmg/*.dmg
