name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: true

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Update version in Cargo.toml
        run: |
          sed -i '' "s/^version = \".*\"/version = \"${{ inputs.version }}\"/" src-tauri/Cargo.toml

      - name: Update version in package.json
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version

      - name: Update version in tauri.conf.json
        run: |
          sed -i '' "s/\"version\": \".*\"/\"version\": \"${{ inputs.version }}\"/" src-tauri/tauri.conf.json

      - name: Build Tauri app
        run: npm run tauri build

      - name: List build artifacts
        run: |
          ls -lh src-tauri/target/release/bundle/macos/
          ls -lh src-tauri/target/release/bundle/dmg/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Conduit v${{ inputs.version }}
          draft: ${{ inputs.draft }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
